# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOW REPOSITORY DISPATCH — Déclencheur d'événements externes
# ═══════════════════════════════════════════════════════════════════════════════
#
# 📚 VUE D'ENSEMBLE PÉDAGOGIQUE :
# Le déclencheur **repository_dispatch** permet aux systèmes externes
# (webhooks, APIs, pages web, bots Slack, etc.) de déclencher des workflows
# via l'API GitHub. C'est le pont entre GitHub Actions et le monde extérieur.
#
# 🎯 CONCEPTS CLÉS :
# 1. **repository_dispatch** : déclencheur de type webhook via l'API REST GitHub
# 2. **event_type** : chaîne personnalisée pour router vers le bon workflow
# 3. **client_payload** : données JSON personnalisées envoyées avec l'événement
# 4. **PAT (Personal Access Token)** : token d'accès personnel requis pour l'API
#
# 💡 COMMENT DÉCLENCHER :
# Via curl :
#   curl -X POST \
#     -H "Accept: application/vnd.github.v3+json" \
#     -H "Authorization: token VOTRE_PAT" \
#     https://api.github.com/repos/0nde/petrole3/dispatches \
#     -d '{"event_type":"health-check","client_payload":{"env":"prod"}}'
#
# Via la page admin PetroSim (voir apps/web/public/admin-dispatch.html) :
#   La page admin fournit une interface pour déclencher ces événements.
#
# 🔒 SÉCURITÉ :
# - Nécessite un PAT avec le scope 'repo' (pas le GITHUB_TOKEN par défaut)
# - La page admin utilise un PAT fourni par l'utilisateur (jamais stocké)
# - Les types d'événements sont validés (seuls les types connus sont traités)
#
# ⚠️ QUAND UTILISER repository_dispatch vs workflow_dispatch :
# ┌─────────────────────┬────────────────────────────────────────────┐
# │ repository_dispatch  │ workflow_dispatch                          │
# ├─────────────────────┼────────────────────────────────────────────┤
# │ Déclenché via API    │ Déclenché via UI GitHub ou API              │
# │ Payload JSON libre   │ Entrées typées (string, choice, boolean)   │
# │ Pour systèmes ext.   │ Pour opérateurs humains                    │
# │ Nécessite un PAT     │ Fonctionne avec GITHUB_TOKEN               │
# │ Tout event_type      │ Entrées fixes définies dans le YAML        │
# └─────────────────────┴────────────────────────────────────────────┘
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Ops — Déclencheur Externe

# ─────────────────────────────────────────────────────────────────────────────
# DÉCLENCHEUR : repository_dispatch avec types d'événements
# ─────────────────────────────────────────────────────────────────────────────
# 📖 'types' filtre quels event_type déclenchent ce workflow.
# Sans 'types', TOUS les événements repository_dispatch le déclencheraient.
# ─────────────────────────────────────────────────────────────────────────────
on:
  repository_dispatch:
    types:
      - health-check      # Vérification de santé à la demande
      - cache-clear       # Vider le cache GitHub Actions
      - ping              # Test de connectivité simple

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: write  # Nécessaire pour la gestion du cache

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 : ROUTAGE — Déterminer l'action selon l'event_type
  # ───────────────────────────────────────────────────────────────────────────
  # 📖 Le job 'route' lit l'event_type et définit des sorties que les jobs
  # en aval utilisent pour décider s'ils doivent s'exécuter.
  # Pattern courant pour les workflows repository_dispatch multi-événements.
  # ───────────────────────────────────────────────────────────────────────────
  route:
    name: "🔀 Router l'événement"
    runs-on: ubuntu-latest
    outputs:
      event_type: ${{ steps.parse.outputs.event_type }}
      payload: ${{ steps.parse.outputs.payload }}
    steps:
      - name: "📨 Analyser l'événement dispatch"
        id: parse
        run: |
          EVENT_TYPE="${{ github.event.action }}"
          echo "event_type=$EVENT_TYPE" >> "$GITHUB_OUTPUT"

          # Logger l'événement pour le débogage
          echo "═════════════════════════════════════════════════"
          echo "📨 Repository Dispatch reçu"
          echo "═════════════════════════════════════════════════"
          echo "Type d'événement : $EVENT_TYPE"
          echo "Déclenché par : ${{ github.actor }}"
          echo "Horodatage : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "Payload client :"
          echo '${{ toJSON(github.event.client_payload) }}'
          echo "═══════════════════════════════════════════════════"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : PING — Test de connectivité simple
  # ───────────────────────────────────────────────────────────────────────────
  # 📖 Le handler dispatch le plus simple. Confirme juste que
  # l'événement a été reçu et traité. Idéal pour tester le mécanisme.
  # ───────────────────────────────────────────────────────────────────────────
  ping:
    name: "🏓 Ping"
    needs: route
    if: github.event.action == 'ping'
    runs-on: ubuntu-latest
    steps:
      - name: "🏓 Pong!"
        run: |
          MESSAGE="${{ github.event.client_payload.message || 'Aucun message fourni' }}"
          SENDER="${{ github.actor }}"

          echo "🏓 PONG!"
          echo ""
          echo "Message : $MESSAGE"
          echo "De : $SENDER"
          echo "Heure : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # Écrire dans le résumé de job
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🏓 Ping → Pong !

          | Champ | Valeur |
          |:------|:-------|
          | **Message** | $MESSAGE |
          | **Expéditeur** | @$SENDER |
          | **Heure** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          > Cet événement a été déclenché via l'API \`repository_dispatch\`.
          EOF

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : VÉRIFICATION SANTÉ — À la demande
  # ───────────────────────────────────────────────────────────────────────────
  health-check:
    name: "🏥 Vérification santé à la demande"
    needs: route
    if: github.event.action == 'health-check'
    runs-on: ubuntu-latest
    steps:
      - name: "🏥 Vérifier les environnements"
        run: |
          TARGET_ENV="${{ github.event.client_payload.env || 'all' }}"
          echo "Environnement cible : $TARGET_ENV"

          check_health() {
            local name=$1
            local url=$2
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
            if [ "$code" = "200" ]; then
              echo "✅ $name : HTTP $code (sain)"
            elif [ "$code" = "403" ]; then
              echo "⚠️  $name : HTTP $code (IP-restrictif, service en cours d'exécution)"
            else
              echo "❌ $name : HTTP $code (non sain)"
            fi
          }

          if [ "$TARGET_ENV" = "all" ] || [ "$TARGET_ENV" = "prod" ]; then
            echo "── Production ──"
            check_health "Backend" "https://${{ secrets.DOMAIN }}/health"
            check_health "Frontend" "https://${{ secrets.DOMAIN }}"
          fi

          if [ "$TARGET_ENV" = "all" ] || [ "$TARGET_ENV" = "dev" ]; then
            echo "── Développement ──"
            check_health "Backend" "https://${{ secrets.DEV_DOMAIN }}/health"
            check_health "Frontend" "https://${{ secrets.DEV_DOMAIN }}"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : VIDER LE CACHE — Purger le cache GitHub Actions
  # ───────────────────────────────────────────────────────────────────────────
  # 📖 Vide le cache GitHub Actions. Utile quand les dépendances en cache
  # sont corrompues ou obsolètes. Utilise l'API REST via gh CLI.
  # ───────────────────────────────────────────────────────────────────────────
  cache-clear:
    name: "🧹 Vider le cache Actions"
    needs: route
    if: github.event.action == 'cache-clear'
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Lister et vider les caches"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📋 Caches actuels :"
          gh api repos/${{ github.repository }}/actions/caches \
            --jq '.actions_caches[] | "\(.id)\t\(.key)\t\(.size_in_bytes)"' \
            2>/dev/null || echo "Aucun cache trouvé"

          echo ""
          echo "🧹 Vidage de tous les caches..."

          CACHE_IDS=$(gh api repos/${{ github.repository }}/actions/caches \
            --jq '.actions_caches[].id' 2>/dev/null || echo "")

          if [ -z "$CACHE_IDS" ]; then
            echo "Aucun cache à vider."
          else
            for id in $CACHE_IDS; do
              echo "Suppression du cache $id..."
              gh api -X DELETE repos/${{ github.repository }}/actions/caches/$id 2>/dev/null || true
            done
            echo "✅ Tous les caches vidés"
          fi

          # Résumé de job
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🧹 Cache vidé

          Tous les caches GitHub Actions ont été purgés.
          Les prochaines exécutions reconstruiront les caches depuis zéro.

          > Déclenché par @${{ github.actor }} via repository_dispatch
          EOF
