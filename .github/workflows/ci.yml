# ═══════════════════════════════════════════════════════════════════════════════
# CI WORKFLOW — Continuous Integration Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# 📚 PEDAGOGICAL OVERVIEW:
# This workflow implements a robust CI pipeline following GitHub Actions best practices.
# It runs on every push to main and on all pull requests, ensuring code quality before merge.
#
# 🎯 KEY CONCEPTS DEMONSTRATED:
# 1. **Reusable Workflows** (workflow_call): Allows other workflows to call this one
# 2. **Concurrency Control**: Prevents wasted resources by canceling outdated runs
# 3. **Matrix Strategy**: Tests across multiple versions/configurations efficiently
# 4. **Dependency Caching**: Speeds up builds by caching npm/pip dependencies
# 5. **Fail-Fast Strategy**: Stops all jobs immediately if one fails (configurable)
# 6. **Job Dependencies**: Controls execution order with 'needs' keyword
#
# 💡 WHY THIS APPROACH:
# - **workflow_call** makes this CI reusable by CD workflows (DRY principle)
# - **Concurrency groups** save GitHub Actions minutes by canceling superseded runs
# - **Matrix builds** ensure compatibility across Node/Python versions
# - **Caching** reduces build time from ~2min to ~30s on cache hits
#
# 🔒 SECURITY CONSIDERATIONS:
# - Uses SHA-pinned action versions to prevent supply chain attacks
# - Minimal permissions (contents: read only)
# - No secrets exposed in this workflow (read-only operations)
#
# ═══════════════════════════════════════════════════════════════════════════════

name: CI — Lint, Typecheck, Test

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
# 📖 EXPLANATION:
# - 'push' on main: Validates every commit to the main branch
# - 'pull_request': Runs checks before allowing merge (GitHub branch protection)
# - 'workflow_call': Enables reuse by cd.yml and cd-dev.yml (avoids duplication)
#
# 💡 BEST PRACTICE: Always run CI on PRs to catch issues before merge.
# This is the foundation of trunk-based development and continuous integration.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # 🔑 Makes this workflow reusable by other workflows

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────
# 📖 EXPLANATION:
# Environment variables set here are available to ALL jobs in this workflow.
# They're defined once and used everywhere, following the DRY principle.
#
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24:
#   - GitHub Actions is transitioning from Node 20 to Node 24
#   - This flag ensures all JavaScript actions use Node 24 (future-proofing)
#   - Prevents deprecation warnings and ensures compatibility
# ─────────────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────
# PERMISSIONS
# ─────────────────────────────────────────────────────────────────────────────
# 📖 EXPLANATION:
# Setting top-level permissions restricts what the GITHUB_TOKEN can do.
# This follows the principle of least privilege: only grant what's needed.
#
# 💡 WHY 'contents: read':
# CI only reads code, it never writes to the repository.
# This prevents accidental (or malicious) code modifications.
#
# 🔒 SECURITY:
# Without explicit permissions, the GITHUB_TOKEN gets default permissions
# which may be overly permissive. Always declare permissions explicitly.
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read  # Only need to read code for CI checks

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# CONCURRENCY CONTROL
# ─────────────────────────────────────────────────────────────────────────────
# 📖 EXPLANATION:
# Concurrency prevents multiple workflow runs from executing simultaneously
# for the same ref (branch/PR). This is crucial for:
# 1. **Cost savings**: Cancels outdated runs when new commits are pushed
# 2. **Resource efficiency**: Frees up GitHub-hosted runners faster
# 3. **Faster feedback**: Developers get results for latest code, not old commits
#
# 💡 HOW IT WORKS:
# - 'group': Creates a unique identifier per branch/PR (github.ref)
# - 'cancel-in-progress: true': Cancels older runs when new one starts
#
# 🎯 EXAMPLE SCENARIO:
# You push commit A → CI starts → You push commit B → CI for A is canceled,
# CI for B starts immediately. You only wait for B's results (the latest code).
#
# ⚠️ WHEN NOT TO USE:
# For deployment workflows (cd.yml), set 'cancel-in-progress: false' to avoid
# partial deployments. CI is safe to cancel because it's read-only.
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ci-${{ github.ref }}  # Unique per branch/PR
  cancel-in-progress: true     # Cancel old runs when new commits arrive

# ═══════════════════════════════════════════════════════════════════════════════
# JOBS DEFINITION
# ═══════════════════════════════════════════════════════════════════════════════
# 📖 EXPLANATION:
# Jobs run in parallel by default (unless 'needs' creates dependencies).
# Each job runs on a fresh virtual machine (runner), isolated from others.
#
# 💡 PARALLELISM STRATEGY:
# Frontend and Backend jobs run simultaneously, cutting total CI time in half.
# This is a key advantage of CI/CD: parallel validation of independent components.
# ═══════════════════════════════════════════════════════════════════════════════

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: FRONTEND VALIDATION
  # ───────────────────────────────────────────────────────────────────────────
  # 📖 PURPOSE:
  # Validates the React/TypeScript frontend codebase through:
  # 1. TypeScript type checking (catches type errors before runtime)
  # 2. ESLint linting (enforces code style and catches common mistakes)
  # 3. Unit tests with Vitest (validates component behavior)
  #
  # 🎯 MATRIX STRATEGY:
  # Tests across multiple Node versions to ensure compatibility.
  # This catches version-specific bugs early (e.g., API changes between Node 20/22).
  #
  # 💡 WHY MATRIX BUILDS:
  # - Ensures code works on all supported Node versions
  # - Catches deprecations early (e.g., Node 20 → 22 migration)
  # - Minimal cost: GitHub runs matrix jobs in parallel
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    # ─────────────────────────────────────────────────────────────────────────
    # MATRIX STRATEGY
    # ─────────────────────────────────────────────────────────────────────────
    # 📖 EXPLANATION:
    # Matrix creates multiple job instances, one per configuration.
    # Here: 2 jobs run in parallel (Node 20 and Node 22).
    #
    # 💡 BEST PRACTICE:
    # - Test on LTS versions (20 = current LTS, 22 = next LTS)
    # - Use 'fail-fast: false' to see all failures, not just the first
    # - Keep matrix small (2-3 versions) to balance coverage vs. cost
    # ─────────────────────────────────────────────────────────────────────────
    strategy:
      fail-fast: false  # Continue testing other versions even if one fails
      matrix:
        node-version: [20, 22]  # Test on current and next LTS
    
    # ─────────────────────────────────────────────────────────────────────────
    # DEFAULT SETTINGS
    # ─────────────────────────────────────────────────────────────────────────
    # 📖 EXPLANATION:
    # 'defaults.run.working-directory' sets the working directory for ALL
    # 'run' steps in this job. Avoids repeating 'cd apps/web' everywhere.
    #
    # 💡 ALTERNATIVE:
    # You could also use 'working-directory' on each step, but this is cleaner.
    # ─────────────────────────────────────────────────────────────────────────
    defaults:
      run:
        working-directory: apps/web
    
    steps:
      # ───────────────────────────────────────────────────────────────────────
      # STEP 1: CHECKOUT CODE
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Clones the repository into the runner's workspace.
      # This is almost always the first step in any workflow.
      #
      # 🔒 SECURITY:
      # - Uses SHA-pinned version to prevent supply chain attacks
      #   (tags can be moved, SHAs are immutable)
      # - Only clones the specific commit being tested (shallow clone)
      #
      # 💡 ADVANCED OPTIONS:
      # - 'fetch-depth: 0' for full history (needed for git-based versioning)
      # - 'submodules: true' if your repo uses git submodules
      # ───────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 2: SETUP PNPM
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Installs pnpm (fast, disk-efficient package manager).
      # Must run BEFORE setup-node to enable pnpm caching.
      #
      # 💡 WHY PNPM:
      # - 3x faster than npm (symlinks instead of copying files)
      # - Saves disk space (shared node_modules across projects)
      # - Strict dependency resolution (prevents phantom dependencies)
      #
      # 🎯 ORDER MATTERS:
      # pnpm/action-setup MUST run before setup-node for caching to work.
      # ───────────────────────────────────────────────────────────────────────
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
        with:
          version: 9  # Pin to major version for stability
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 3: SETUP NODE.JS
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Installs Node.js and configures dependency caching.
      # The 'cache: pnpm' option is the KEY to fast builds.
      #
      # 💡 HOW CACHING WORKS:
      # 1. First run: Downloads all dependencies (~2 min), saves to cache
      # 2. Subsequent runs: Restores from cache (~10 sec), skips download
      # 3. Cache key: Hash of pnpm-lock.yaml (invalidates when deps change)
      #
      # 🎯 CACHE BENEFITS:
      # - Reduces build time by 70-90% on cache hits
      # - Saves GitHub Actions minutes (cost savings)
      # - Faster feedback for developers
      #
      # ⚠️ CACHE LIMITS:
      # - GitHub caches expire after 7 days of no use
      # - 10 GB total cache limit per repository
      # - Oldest caches are evicted when limit is reached
      # ───────────────────────────────────────────────────────────────────────
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'  # 🚀 Enables automatic dependency caching
          cache-dependency-path: apps/web/pnpm-lock.yaml
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 4: INSTALL DEPENDENCIES
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Installs npm packages defined in package.json.
      # On cache hit, this step is nearly instant (restores from cache).
      # On cache miss, downloads all packages and populates the cache.
      #
      # 💡 WHY 'frozen-lockfile':
      # - Ensures exact versions from pnpm-lock.yaml are installed
      # - Prevents "works on my machine" issues from version drift
      # - Fails if package.json and lock file are out of sync (catches mistakes)
      # ───────────────────────────────────────────────────────────────────────
      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 5: TYPESCRIPT TYPE CHECKING
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Runs TypeScript compiler in check-only mode (no output files).
      # Catches type errors that would cause runtime failures.
      #
      # 💡 WHY '--noEmit':
      # - Faster than full compilation (no .js files generated)
      # - We only care about type errors, not build artifacts
      # - Build happens separately in the CD workflow
      #
      # 🎯 WHAT IT CATCHES:
      # - Type mismatches (string passed where number expected)
      # - Missing properties on objects
      # - Incorrect function signatures
      # - Null/undefined access errors
      # ───────────────────────────────────────────────────────────────────────
      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit --pretty
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 6: UNIT TESTS
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Runs Vitest unit tests to validate component behavior.
      # Tests run in Node environment (jsdom for DOM simulation).
      #
      # 💡 WHY UNIT TESTS IN CI:
      # - Catches regressions (new code breaking old features)
      # - Documents expected behavior (tests as living documentation)
      # - Enables confident refactoring (tests verify nothing broke)
      #
      # 🎯 COVERAGE REPORTING:
      # Could add '--coverage' to generate coverage reports.
      # Then upload to Codecov/Coveralls for tracking over time.
      #
      # ⚠️ CURRENT STATUS:
      # 'continue-on-error: true' means test failures don't block the workflow.
      # This is a temporary measure while building out test suite.
      # REMOVE THIS once tests are comprehensive and reliable.
      # ───────────────────────────────────────────────────────────────────────
      - name: 🧪 Run unit tests
        run: pnpm test
        continue-on-error: true  # ⚠️ TODO: Remove once test suite is stable

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: BACKEND VALIDATION
  # ───────────────────────────────────────────────────────────────────────────
  # 📖 PURPOSE:
  # Validates the FastAPI/Python backend codebase through:
  # 1. Ruff linting (fast Python linter, replaces flake8/black/isort)
  # 2. Type checking with mypy (optional, can be added)
  # 3. Unit tests with pytest (validates business logic)
  #
  # 🎯 MATRIX STRATEGY:
  # Tests across Python 3.11 and 3.12 to ensure compatibility.
  # Python 3.12 is latest stable, 3.11 is widely deployed.
  #
  # 💡 PARALLEL EXECUTION:
  # This job runs in parallel with 'frontend', cutting total CI time.
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    
    # ─────────────────────────────────────────────────────────────────────────
    # MATRIX STRATEGY
    # ─────────────────────────────────────────────────────────────────────────
    # 📖 EXPLANATION:
    # Tests on Python 3.11 (stable, widely used) and 3.12 (latest).
    # Ensures code works on both versions (catches version-specific issues).
    #
    # 💡 FUTURE-PROOFING:
    # When Python 3.13 is released, add it to the matrix.
    # Drop 3.11 when it reaches end-of-life (Oct 2027).
    # ─────────────────────────────────────────────────────────────────────────
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    
    defaults:
      run:
        working-directory: apps/api
    
    steps:
      # ───────────────────────────────────────────────────────────────────────
      # STEP 1: CHECKOUT CODE
      # ───────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 2: SETUP PYTHON
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Installs Python and configures pip caching.
      # The 'cache: pip' option dramatically speeds up dependency installation.
      #
      # 💡 HOW PIP CACHING WORKS:
      # 1. Cache key: Hash of requirements.txt
      # 2. First run: Downloads all packages, saves to cache
      # 3. Subsequent runs: Restores from cache (90% faster)
      #
      # 🎯 CACHE INVALIDATION:
      # Cache is automatically invalidated when requirements.txt changes.
      # This ensures you always get the correct dependency versions.
      #
      # ⚠️ VIRTUAL ENVIRONMENTS:
      # GitHub Actions creates a fresh venv for each run.
      # No need to manually create/activate venv in CI.
      # ───────────────────────────────────────────────────────────────────────
      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # 🚀 Enables automatic pip caching
          cache-dependency-path: apps/api/requirements.txt
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 3: INSTALL DEPENDENCIES
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Installs Python packages from requirements.txt.
      # On cache hit, this is nearly instant (packages restored from cache).
      #
      # 💡 WHY '--no-deps' IS NOT USED:
      # We want pip to verify all transitive dependencies are correct.
      # This catches dependency conflicts early.
      #
      # 🎯 UPGRADE STRATEGY:
      # Use 'pip install --upgrade' to get latest compatible versions.
      # But in CI, we want reproducible builds, so we don't use --upgrade.
      # ───────────────────────────────────────────────────────────────────────
      - name: 📚 Install dependencies
        run: pip install -r requirements.txt
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 4: RUFF LINTING
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Ruff is a blazing-fast Python linter written in Rust.
      # It replaces flake8, black, isort, and more (all-in-one tool).
      #
      # 💡 WHY RUFF:
      # - 10-100x faster than flake8 (written in Rust, not Python)
      # - Combines multiple tools (linter + formatter + import sorter)
      # - Auto-fixes many issues (--fix flag)
      # - Used by major projects (FastAPI, Pydantic, etc.)
      #
      # 🎯 WHAT IT CHECKS:
      # - PEP 8 style violations (line length, naming conventions)
      # - Unused imports and variables
      # - Security issues (e.g., hardcoded passwords)
      # - Performance anti-patterns
      # - Type annotation issues
      #
      # 🔧 CONFIGURATION:
      # Ruff config is in pyproject.toml or ruff.toml.
      # Can customize rules, line length, ignore patterns, etc.
      # ───────────────────────────────────────────────────────────────────────
      - name: 🎨 Ruff linting
        run: |
          pip install ruff
          ruff check app/ scripts/ --output-format=github
        # 'output-format=github' creates inline annotations on PR files
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 5: TYPE CHECKING (OPTIONAL)
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Mypy performs static type checking on Python code.
      # Catches type errors before runtime (like TypeScript for Python).
      #
      # 💡 WHY TYPE CHECKING:
      # - Catches bugs early (type mismatches, None access)
      # - Improves IDE autocomplete and refactoring
      # - Documents function signatures (types as documentation)
      #
      # 🎯 CURRENT STATUS:
      # Commented out because not all code has type hints yet.
      # Uncomment when you've added type annotations to your codebase.
      #
      # ⚠️ GRADUAL ADOPTION:
      # Start with 'mypy --check-untyped-defs' for gradual adoption.
      # Then move to strict mode once coverage is high.
      # ───────────────────────────────────────────────────────────────────────
      # - name: 🔍 Type checking with mypy
      #   run: |
      #     pip install mypy
      #     mypy app/ --ignore-missing-imports
      
      # ───────────────────────────────────────────────────────────────────────
      # STEP 6: UNIT TESTS
      # ───────────────────────────────────────────────────────────────────────
      # 📖 EXPLANATION:
      # Runs pytest to execute all unit tests.
      # Tests validate business logic, API endpoints, database operations.
      #
      # 💡 PYTEST FLAGS EXPLAINED:
      # - '-x': Stop on first failure (fail-fast)
      # - '-q': Quiet output (less verbose)
      # - '--tb=short': Short traceback format (easier to read)
      # - '--cov': Generate coverage report (optional, requires pytest-cov)
      #
      # 🎯 COVERAGE REPORTING:
      # Add '--cov=app --cov-report=xml' to generate coverage.xml.
      # Then upload to Codecov for tracking coverage over time.
      #
      # ⚠️ CURRENT STATUS:
      # 'continue-on-error: true' means failures don't block workflow.
      # This is temporary while building out test suite.
      # REMOVE THIS once tests are comprehensive.
      # ───────────────────────────────────────────────────────────────────────
      - name: 🧪 Run unit tests
        run: pytest -x -q --tb=short
        continue-on-error: true  # ⚠️ TODO: Remove once test suite is stable
  
  # ──────────────────────────────────────────────────────────────────────�
