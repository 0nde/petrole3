name: CD Dev — Deploy to dev-petrosim.joyon.org

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy-dev-backend:
    name: Deploy Dev Backend (Lambda)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        run: sam build --template-file infra/aws/template.yaml

      - name: SAM Deploy (dev)
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name petrosim-dev \
            --region eu-west-3 \
            --capabilities CAPABILITY_IAM \
            --resolve-image-repos \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "DatabaseUrl=${{ secrets.DEV_DATABASE_URL }}" \
              "SyncDatabaseUrl=${{ secrets.DEV_SYNC_DATABASE_URL }}" \
              "DomainName=dev-petrosim.joyon.org" \
              "CertificateArn=${{ secrets.DEV_CERTIFICATE_ARN }}"

  deploy-dev-frontend:
    name: Deploy Dev Frontend (S3 + CloudFront)
    needs: deploy-dev-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install
        working-directory: apps/web

      - name: Build
        run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.DEV_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "*.json"
          aws s3 cp dist/index.html s3://${{ secrets.DEV_S3_BUCKET }}/index.html \
            --cache-control "public, max-age=60" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
