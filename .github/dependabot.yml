version: 2
updates:
  # Frontend (npm/pnpm)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      # TailwindCSS 4.x has breaking changes (new config system with @theme)
      # Requires complete config migration - ignore major updates for now
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      dev-dependencies:
        dependency-type: "development"

  # Backend (pip)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
